<!-- templates/thank_you.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You!</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding-top: 5%;
            animation: fadeIn 1s ease-in-out;
            margin: 0;
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to   { opacity: 1; transform: scale(1); }
        }

        .thank-you-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            margin-top: 0;
        }

        p {
            font-size: 1.2em;
            margin: 15px 0;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 35px;
            flex-wrap: wrap;
        }

        .select-again-btn, .home-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 14px 35px;
            border-radius: 50px;
            transition: all 0.3s ease;
            font-size: 1.05em;
            cursor: pointer;
            border: 2px solid white;
            display: inline-block;
        }

        .select-again-btn {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .select-again-btn:hover {
            background-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .home-btn {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .home-btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .thank-you-box {
                padding: 35px;
                max-width: 90%;
            }

            h1 {
                font-size: 2.2em;
                margin-bottom: 15px;
            }

            p {
                font-size: 1em;
                margin: 10px 0;
            }

            .action-buttons {
                gap: 12px;
                margin-top: 25px;
            }

            .select-again-btn, .home-btn {
                padding: 12px 25px;
                font-size: 1em;
            }
        }

        @media (max-width: 480px) {
            body {
                padding-top: 1%;
            }

            .thank-you-box {
                padding: 25px;
                max-width: 95%;
                border-radius: 15px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 12px;
            }

            p {
                font-size: 0.9em;
                margin: 8px 0;
            }

            .action-buttons {
                flex-direction: column;
                gap: 10px;
                margin-top: 20px;
            }

            .select-again-btn, .home-btn {
                padding: 11px 20px;
                font-size: 0.95em;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="thank-you-box">
        <h1>🎉 Thank You!</h1>
        <p>We appreciate your feedback!</p>
        <p>Your input helps us improve future recommendations.</p>
        
        <div class="action-buttons">
            <a href="{{ url_for('buy_recommendations') }}" class="select-again-btn">🔄 Select Again</a>
            <a href="/" class="home-btn">🏠 Back to Home</a>
        </div>
    </div>
</body>
</html>
